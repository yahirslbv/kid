name: graficacion_ai
description: "Una app de graficación matemática 2D/3D con asistencia de IA."
publish_to: 'none' 

version: 1.0.0+4

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: any

  http: ^1.2.0

  # --- Iconos base ---
  cupertino_icons: ^1.0.6

  # --- Gestión de Estado ---
  provider: ^6.1.1

  # --- Matemáticas y Lógica ---
  math_expressions: ^3.1.0
  vector_math: ^2.1.4

  # --- Visualización (Gráficos) ---
  fl_chart: ^1.1.1
  
  # 3D con ditredi (fallback desktop)
  ditredi: ^2.0.2

  # 3D mejorado: WebView para Three.js (WebGL real)
  webview_flutter: ^4.13.0

  # --- Inteligencia Artificial ---
  google_generative_ai: ^0.4.7
  
  # --- UI / Diseño ---
  flutter_markdown: ^0.7.7+1
  flutter_markdown_latex: any
  markdown: any
  google_fonts: ^8.0.1
  flutter_dotenv: ^5.1.0

  # --- Firebase ---
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.0.0
  image_picker: ^1.2.1
  app_links: ^7.0.0
  translator: ^1.0.4+1
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.4
  image_cropper: ^11.0.0
  flutter_math_fork: ^0.7.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - .env
    - assets/

# --- CONFIGURACIÓN PARA GENERAR LOS ÍCONOS DE LA APP ---
flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#0F1E2E"
    theme_color: "#0F1E2E"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
  macos:
    generate: true
    image_path: "assets/app_icon.png"